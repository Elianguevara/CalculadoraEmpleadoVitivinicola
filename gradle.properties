properties
# Contenido para gradle.properties

# --------------------------------------------
# ?? CONFIGURACIÓN GENERAL DE GRADLE
# --------------------------------------------

# Memoria asignada al daemon de Gradle
org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8

# Habilita el uso de AndroidX
android.useAndroidX=true

# Habilita Jetifier (compatibilidad con bibliotecas antiguas)
android.enableJetifier=true

# --------------------------------------------
# ? OPCIONALES (pueden mejorar velocidad)
# --------------------------------------------

# Permite compilación paralela en proyectos grandes
org.gradle.parallel=true

# Cacheo de configuración (optimiza gradle sync)
org.gradle.configuration-cache=true
